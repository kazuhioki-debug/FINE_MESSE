<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINE</title>
    <!-- Supabaseを使うためのライブラリを読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 📱 全体の背景：優しく薄いオレンジ */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #FFF2E6; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        /* ヘッダー */
        header { 
            background-color: #ffffff; 
            color: #4A3E3D; 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 18px; 
            border-bottom: 1px solid #FFE4CC; 
            position: sticky; 
            top: 0; 
        }
        
        /* チャットタイムライン */
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-break: break-all; position: relative; }
        
        /* 相手のメッセージ（白ベース） */
        .message.received { 
            background-color: #ffffff; 
            color: #333333; 
            align-self: flex-start; 
            border-top-left-radius: 2px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
        }
        
        /* 🟢 自分のメッセージ：オリーブグリーン */
        .message.sent { 
            background-color: #A3B899; 
            color: #ffffff; 
            align-self: flex-end; 
            border-top-right-radius: 2px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        /* 送信フォーム */
        form { background-color: #ffffff; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #FFE4CC; position: sticky; bottom: 0; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #EAD5C3; border-radius: 20px; font-size: 16px; outline: none; background-color: #FAFAFA; }
        
        button { 
            background-color: #A3B899; 
            border: none; 
            color: #ffffff; 
            font-weight: bold; 
            padding: 0 20px; 
            border-radius: 20px; 
            font-size: 15px; 
            cursor: pointer; 
        }

        /* ------------------------------------
           ✨ おしゃれな名前入力モーダル（ポップアップ）
        ------------------------------------ */
        #name-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(74, 62, 61, 0.4); /* うっすら暗く */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px); /* 背景をほんのりぼかす */
        }

        .name-modal {
            background-color: #ffffff;
            width: 85%;
            max-width: 320px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .name-modal h3 {
            color: #4A3E3D;
            font-size: 17px;
            margin-bottom: 8px;
        }

        .name-modal p {
            color: #8C7A78;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .name-modal input {
            width: 100%;
            padding: 12px;
            border: 1px solid #EAD5C3;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background-color: #FAFAFA;
            margin-bottom: 16px;
            text-align: center;
        }

        .name-modal button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <header>FINE チャットルーム</header>

    <div id="chat-container"></div>

    <form id="message-form" onsubmit="sendMessage(event)">
        <input type="text" id="message-input" placeholder="メッセージを入力..." autocomplete="off" required>
        <button type="submit">送信</button>
    </form>

    <!-- ✨ おしゃれな名前入力ポップアップ -->
    <div id="name-modal-overlay">
        <div class="name-modal">
            <h3>ようこそ！</h3>
            <p>チャットで使うお名前を教えてください</p>
            <input type="text" id="modal-username-input" placeholder="例：ゲスト" autofocus>
            <button type="button" onclick="saveUsername()">参加する</button>
        </div>
    </div>

    <audio id="fine-sound" src="fine.mp3" preload="auto"></audio>

    <script>
        const SUPABASE_URL = "https://bsgtorlxzafuudqyrpma.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_GFNwsm5bZgigv1FoMTKzYA_dooFk8r_";
        
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const fineSound = document.getElementById('fine-sound');

        let currentUserId = "ゲスト";

        // 名前を保存してポップアップを閉じる
        function saveUsername() {
            const inputVal = document.getElementById('modal-username-input').value.trim();
            if (inputVal) {
                currentUserId = inputVal;
            }
            document.getElementById('name-modal-overlay').style.display = 'none';
            loadMessages(); // 名前が決まったら読み込み開始
        }

        // 1. 過去のメッセージ読み込み
        async function loadMessages() {
            try {
                chatContainer.innerHTML = ''; 
                const { data, error } = await db
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (data) {
                    data.forEach(msg => appendMessage(msg));
                }
            } catch (err) {
                console.log('エラー:', err);
            }
        }

        // 2. 画面にメッセージ追加
        function appendMessage(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            
            if (msg.username === currentUserId) {
                msgDiv.classList.add('sent');
            } else {
                msgDiv.classList.add('received');
                fineSound.play().catch(e => console.log("音再生エラー:", e));
            }
            
            msgDiv.innerText = msg.text; 
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 3. メッセージ送信
        async function sendMessage(event) {
            event.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            const { data, error } = await db
                .from('messages')
                .insert([
                    { username: currentUserId, text: text }
                ])
                .select();

            if (!error) {
                messageInput.value = '';
                if (data && data.length > 0) {
                    appendMessage(data[0]);
                }
            }
        }

        // 4. リアルタイム受信
        db.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.username !== currentUserId) {
                    appendMessage(payload.new);
                }
            })
            .subscribe();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINE</title>
    <!-- Supabaseを使うためのライブラリを読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 📱 全体の背景：優しく薄いオレンジ（アプリ風） */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #FFF2E6; /* ★ここを薄いオレンジに変更 */
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        /* ヘッダー */
        header { 
            background-color: #ffffff; 
            color: #4A3E3D; /* 文字も少し温かみのある焦げ茶に */
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 18px; 
            border-bottom: 1px solid #FFE4CC; 
            position: sticky; 
            top: 0; 
        }
        
        /* チャットタイムライン */
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-break: break-all; position: relative; }
        
        /* 相手のメッセージ（白ベース） */
        .message.received { 
            background-color: #ffffff; 
            color: #333333; 
            align-self: flex-start; 
            border-top-left-radius: 2px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* ほんのり影をつけて見やすく */
        }
        
        /* 🟢 自分のメッセージ：オレンジに馴染む優しいオリーブグリーン */
        .message.sent { 
            background-color: #A3B899; /* ★元の黄緑から、落ち着いた優しい緑に変更 */
            color: #ffffff; /* 文字を白にして読みやすく */
            align-self: flex-end; 
            border-top-right-radius: 2px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        /* 送信フォーム */
        form { background-color: #ffffff; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #FFE4CC; position: sticky; bottom: 0; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #EAD5C3; border-radius: 20px; font-size: 16px; outline: none; background-color: #FAFAFA; }
        
        /* 🟢 送信ボタンも同じ優しい緑に統一 */
        button { 
            background-color: #A3B899; /* ★ボタンの緑も変更 */
            border: none; 
            color: #ffffff; 
            font-weight: bold; 
            padding: 0 20px; 
            border-radius: 20px; 
            font-size: 15px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <header>FINE チャットルーム</header>

    <div id="chat-container">
        <!-- ここにメッセージがリアルタイムで追加されます -->
        <div class="message received">ここに相手からのメッセージが入ります</div>
        <div class="message sent">ここに自分が送ったメッセージが入ります</div>
    </div>

    <form id="message-form" onsubmit="sendMessage(event)">
        <input type="text" id="message-input" placeholder="メッセージを入力..." autocomplete="off" required>
        <button type="submit">送信</button>
    </form>

    <!-- 「ファイン！」の通知音用オーディオタグ -->
    <audio id="fine-sound" src="fine.mp3" preload="auto"></audio>

    <script>
        // 【重要】あなたのSupabaseプロジェクトのURLとanonキーに書き換えてください
        const SUPABASE_URL = "https://bsgtorlxzafuudqyrpma.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_GFNwsm5bZgigv1FoMTKzYA_dooFk8r_";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const fineSound = document.getElementById('fine-sound');

// ★ここを書き換えます！ページを開いたときに名前を入力してもらうようにします
        const currentUserId = prompt("ユーザー名を入力してください", "ゲスト") || "ゲスト";
        const targetRoomId = "your-room-uuid";

// 1. ページを開いたときに過去のメッセージを読み込む
        async function loadMessages() {
            chatContainer.innerHTML = ''; // 一旦クリア
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true }); // room_idの絞り込みを外しました

            if (data) {
                data.forEach(msg => appendMessage(msg));
            }
        }

        // 2. 画面にメッセージを追加する
        function appendMessage(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            
            // 今回はシンプルに username が自分かどうかで判定します
            if (msg.username === currentUserId) {
                msgDiv.classList.add('sent');
            } else {
                msgDiv.classList.add('received');
                fineSound.play().catch(e => console.log("音再生エラー:", e));
            }
            
            msgDiv.innerText = msg.text; // message_text から text に修正
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

// 3. メッセージを送信する
        async function sendMessage(event) {
            event.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            // 送信してみる
            const { data, error } = await supabase
                .from('messages')
                .insert([
                    { username: currentUserId, text: text }
                ])
                .select(); // ★ここを追加（保存できたデータを返すようにする）

            if (error) {
                // エラーが出たら画面に理由を表示！
                alert('Supabaseエラー: ' + error.message);
            } else {
                messageInput.value = '';
                // 画面に即座に追加してみる
                if (data && data.length > 0) {
                    appendMessage(data[0]);
                }
            }
        }

        // 4. Supabaseのリアルタイム機能をONにする
        supabase
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new);
            })
            .subscribe();

        // 初期読み込みを実行
        loadMessages();
    </script>
</body>
</html>
